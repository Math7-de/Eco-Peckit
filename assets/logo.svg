<svg width="280" height="64" viewBox="0 0 280 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Eco Peckit logo">
  <defs>
    <linearGradient id="badgeFill" x1="8" y1="4" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1B2F"/>
      <stop offset="1" stop-color="#0A1322"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="15" y1="16" x2="53" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.7" stop-color="#DDEBFF"/>
      <stop offset="1" stop-color="#C4DCF7"/>
    </linearGradient>
    <linearGradient id="leafGlow" x1="24" y1="12" x2="35" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#74FFD8"/>
      <stop offset="1" stop-color="#2EE6A6"/>
    </linearGradient>
    <linearGradient id="gold" x1="14" y1="34" x2="21" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE08A"/>
      <stop offset="1" stop-color="#F2C94C"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="66" height="66" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="4.5" y="4.5" width="55" height="55" rx="17.5" fill="url(#badgeFill)"/>
    <rect x="4.5" y="4.5" width="55" height="55" rx="17.5" stroke="rgba(142,162,192,0.35)" stroke-opacity="0.4"/>
  </g>

  <!-- subtle echo of the original mascot + bin mark -->
  <path d="M16 41.5C20.2 36.2 24.1 31.5 28.8 28.2C32.9 25.4 38 24.1 43.5 24.2" stroke="url(#lineGlow)" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M20 45.5H14.2C13.6 45.5 13.1 45 13.1 44.4V38.5" stroke="url(#gold)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M27 21.2C29 16.8 34.2 14.7 38.6 16.4C36.8 20.9 31.7 23.1 27 21.2Z" fill="url(#leafGlow)"/>
  <path d="M27.4 21C31.1 21.6 34 23.6 35.8 27.1" stroke="#A6FFE4" stroke-width="2.3" stroke-linecap="round"/>
  <path d="M31.8 29.4C29.1 32.5 26.1 35 22.6 37.1" stroke="url(#lineGlow)" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M36.5 27.3L38.6 32.4M42.2 25.7L44.3 30.9" stroke="#86FFD7" stroke-width="2.2" stroke-linecap="round"/>

  <!-- basket/grid element from the original logo -->
  <rect x="39.8" y="30.1" width="10.8" height="11.3" rx="2.1" stroke="url(#lineGlow)" stroke-width="2.2"/>
  <path d="M42.2 30.2L43.3 26.8H47L48.3 30.2" stroke="url(#lineGlow)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M43.2 33.1V41.2M47.2 33.1V41.2M40.7 35.9H49.7M40.7 38.7H49.7" stroke="#D9E8FF" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="23.4" cy="38.6" r="2" fill="#F2C94C"/>
  <circle cx="27.4" cy="34.8" r="1.7" fill="#2EE6A6" fill-opacity="0.95"/>

  <text x="72" y="30" fill="#EEF4FF" font-size="23" font-family="Inter, Arial, sans-serif" font-weight="800" letter-spacing="-0.03em">Eco Peckit</text>
  <text x="72" y="48" fill="#8EA2C0" font-size="12" font-family="Inter, Arial, sans-serif" font-weight="600" letter-spacing="0.02em">smart recycling platform</text>
</svg>
